name: Bug Report
description: Report a problem with the action
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Fill in the details below so we can reproduce the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: action-config
    attributes:
      label: Action configuration
      description: The relevant step from your workflow (redact secrets)
      render: yaml
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant log output from the workflow run
      render: text
    validations:
      required: false
  - type: input
    id: runner
    attributes:
      label: Runner
      description: e.g. ubuntu-latest, self-hosted
    validations:
      required: false
